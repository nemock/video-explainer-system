<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — record voiceover</title>
<style>
  :root { --bg:#0b1020; --fg:#f5f7ff; --accent:#5b8cff; --good:#3ddc84; --bad:#ff7a59; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif; }
  header { position:sticky; top:0; background:rgba(11,16,32,.95); backdrop-filter:blur(8px);
    padding:18px 24px; border-bottom:1px solid #20284a; display:flex; align-items:center; gap:16px; }
  header h1 { font-size:20px; margin:0; font-weight:800; }
  #progress { font-size:14px; opacity:.8; }
  main { max-width:820px; margin:0 auto; padding:24px; }
  .card { background:#121a33; border:1px solid #20284a; border-radius:16px; padding:24px;
    margin-bottom:18px; }
  .card.recorded { border-color:var(--good); }
  .meta { font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent);
    font-weight:700; margin-bottom:10px; display:flex; justify-content:space-between; }
  .status.ok { color:var(--good); } .status.none { color:#7a85ad; }
  .script { font-size:30px; line-height:1.4; font-weight:600; margin-bottom:18px; }
  button { font:inherit; font-weight:700; border:0; border-radius:999px; padding:12px 22px;
    cursor:pointer; background:var(--accent); color:#fff; }
  button.rec { background:var(--bad); }
  button.ghost { background:#1b2banner; background:#1b2547; color:var(--fg); }
  button:disabled { opacity:.45; cursor:default; }
  .row { display:flex; gap:12px; align-items:center; }
  audio { height:34px; }
  #finish { position:sticky; bottom:0; background:linear-gradient(transparent,#0b1020 40%);
    padding:24px; text-align:center; }
  #finishBtn { background:var(--good); color:#06210f; font-size:18px; padding:16px 40px; }
  #doneMsg { display:none; text-align:center; padding:60px 24px; font-size:24px; }
  .hint { opacity:.7; font-size:14px; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>🎙️ {{TITLE}}</h1>
  <div id="progress">0 / 0 recorded</div>
</header>
<main id="list"></main>
<div id="finish"><button id="finishBtn">Finish &amp; render →</button>
  <div class="hint">Record every segment, then click Finish. You can re-record any segment.</div></div>
<div id="doneMsg">✅ All set — you can close this tab. The tool is rendering your video.</div>

<script>
let segs = [], stream = null, rec = null, chunks = [], activeId = null;

async function ensureMic() {
  if (!stream) stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return stream;
}

function progress() {
  const n = segs.filter(s => s.recorded).length;
  document.getElementById('progress').textContent = `${n} / ${segs.length} recorded`;
  document.getElementById('finishBtn').disabled = n < segs.length;
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  segs.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card' + (s.recorded ? ' recorded' : '');
    card.innerHTML =
      `<div class="meta"><span>Segment ${s.id + 1} · ${s.slide}</span>
        <span class="status ${s.recorded ? 'ok' : 'none'}">${s.recorded ? '✓ recorded' : 'not recorded'}</span></div>
       <div class="script">${s.text}</div>
       <div class="row">
         <button data-rec="${s.id}">${s.recorded ? 'Re-record' : 'Record'}</button>
         ${s.recorded ? `<audio controls src="/clip?seg=${s.id}&t=${Date.now()}"></audio>` : ''}
       </div>`;
    list.appendChild(card);
  });
  document.querySelectorAll('[data-rec]').forEach(b =>
    b.addEventListener('click', () => toggle(parseInt(b.dataset.rec), b)));
  progress();
}

async function toggle(id, btn) {
  if (activeId === id) { rec.stop(); return; }            // stop current
  if (rec && rec.state === 'recording') return;            // one at a time
  await ensureMic();
  chunks = []; activeId = id;
  rec = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  rec.ondataavailable = e => chunks.push(e.data);
  rec.onstop = async () => {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    btn.textContent = 'Saving…'; btn.disabled = true;
    const r = await fetch('/save?seg=' + id, { method: 'POST', body: blob });
    const j = await r.json();
    activeId = null;
    if (j.ok) { segs.find(s => s.id === id).recorded = true; }
    render();
  };
  rec.start();
  btn.textContent = '■ Stop'; btn.classList.add('rec');
}

document.getElementById('finishBtn').addEventListener('click', async () => {
  await fetch('/done', { method: 'POST' });
  document.querySelector('main').style.display = 'none';
  document.getElementById('finish').style.display = 'none';
  document.getElementById('doneMsg').style.display = 'block';
});

fetch('/segments').then(r => r.json()).then(d => { segs = d; render(); });
</script>
</body>
</html>
